<td width="50%" valign="top">
    <h2>Base64 Encoder / Decoder</h2>

    <p>Enter text below and choose Encode or Decode:</p>

    <textarea id="inputText" rows="6" cols="50"></textarea>
    <br><br>

    <input type="button" value="Encode" onclick="encodeText()">
    <input type="button" value="Decode" onclick="decodeText()">
    <br><br>

    <textarea id="outputText" rows="6" cols="50" readonly></textarea>

    <script>
        function encodeText() {
            const input = document.getElementById('inputText').value;
            try {
                document.getElementById('outputText').value = btoa(input);
            } catch(e) {
                document.getElementById('outputText').value = 'Error encoding text';
            }
        }

        function decodeText() {
            const input = document.getElementById('inputText').value;
            try {
                document.getElementById('outputText').value = atob(input);
            } catch(e) {
                document.getElementById('outputText').value = 'Error decoding text';
            }
        }
    </script>
